version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: labbridge_postgres
    restart: always
    environment:
      POSTGRES_USER: labbridge
      POSTGRES_PASSWORD: labbridge_secret
      POSTGRES_DB: labbridge_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labbridge -d labbridge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: labbridge_redis
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labbridge_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://labbridge:labbridge_secret@db:5432/labbridge_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super-secret-jwt-key-change-in-prod-labbridge
      - JWT_REFRESH_SECRET=super-secret-refresh-key-change-in-prod-labbridge
      - SMS_PROVIDER_KEY=dev
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost:80
      - MAX_FILE_SIZE_MB=500
      - CHUNK_SIZE_KB=512
    ports:
      - "8000:8000"

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: labbridge_webapp
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
