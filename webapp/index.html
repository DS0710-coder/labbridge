<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabBridge v2 — PC Terminal</title>
  <script src="qr.min.js"></script>
  <style>
    :root {
      --bg: #0A0A0F;
      --surface: #111118;
      --surface-hover: #191924;
      --border: #1E1E2E;
      --primary: #6C63FF;
      --success: #22C55E;
      --error: #EF4444;
      --text: #E8E8F0;
      --muted: #6B6B80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 650px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: var(--text); }
    .status-badge { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .btn-disconnect { background: transparent; border: 1px solid var(--border); color: var(--error); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-left: 10px; }
    .btn-disconnect:hover { background: rgba(239, 68, 68, 0.1); }
    
    /* Phase 1: Waiting */
    #phase-waiting { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 20px 0; }
    .qr-box { background: #E8E8F0; padding: 16px; border-radius: 12px; display: flex; align-items: center; justify-content: center; min-width: 252px; min-height: 252px; }
    #qrcode { width: 220px; height: 220px; }
    .timer { font-size: 14px; color: var(--muted); }
    .timer span { color: var(--primary); font-weight: 600; }

    /* Phase 2: Paired & Folders */
    #phase-paired { display: none; flex-direction: column; gap: 20px; }
    .breadcrumb { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; font-size: 14px; color: var(--muted); padding: 8px 12px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--border); }
    .breadcrumb-item { cursor: pointer; color: var(--text); transition: color 0.15s; }
    .breadcrumb-item:hover { color: var(--primary); }
    .breadcrumb-sep { color: var(--muted); }
    .folder-grid { display: flex; flex-wrap: wrap; gap: 10px; min-height: 80px; }
    .folder-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
    .folder-btn:hover { border-color: var(--primary); background: var(--surface-hover); }
    .folder-btn.active { border-color: var(--primary); background: rgba(108, 99, 255, 0.15); font-weight: 600; }
    
    .dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .dropzone:hover, .dropzone.dragover { border-color: var(--primary); background: rgba(108, 99, 255, 0.05); }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone p { font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .dropzone span { font-size: 13px; color: var(--muted); }

    /* Phase 3: Transferring */
    #phase-transferring { display: none; flex-direction: column; gap: 20px; padding: 10px 0; }
    .transfer-info { display: flex; justify-content: space-between; font-size: 14px; }
    .progress-bar-wrap { width: 100%; height: 12px; background: var(--bg); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }
    .btn-cancel { align-self: flex-start; background: transparent; border: 1px solid var(--border); color: var(--error); padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    
    /* Phase 4: Done */
    #phase-done { display: none; flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 20px 0; }
    .done-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(34, 197, 94, 0.15); color: var(--success); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; }
    .btn-reset { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>LabBridge v2</h1>
      <div class="status-badge">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Disconnected</span>
        <button id="btn-disconnect" class="btn-disconnect" style="display:none;" onclick="disconnectSession()">Disconnect</button>
      </div>
    </header>

    <!-- Phase 1: Waiting -->
    <div id="phase-waiting">
      <div class="qr-box">
        <div id="qrcode"></div>
      </div>
      <p style="font-size: 16px; font-weight: 500;">Scan with LabBridge Mobile App</p>
      <div class="timer">Session refreshes in <span id="timer-sec">240s</span></div>
    </div>

    <!-- Phase 2: Paired & Browsing -->
    <div id="phase-paired">
      <div>
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 6px;">Target Folder on Phone:</p>
        <div id="breadcrumb" class="breadcrumb">
          <span class="breadcrumb-item" onclick="navigateRoot()">Root</span>
        </div>
      </div>

      <div id="folder-grid" class="folder-grid">
        <!-- Folders injected dynamically -->
      </div>

      <div id="dropzone" class="dropzone">
        <input type="file" id="file-input" multiple />
        <p>Drop files here or click to browse</p>
        <span id="queue-status">Will be saved directly to the selected folder above</span>
      </div>

      <div id="received-files-section" style="display:none; margin-top: 16px;">
        <p style="font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px;">Received from Phone:</p>
        <div id="received-files-list"></div>
      </div>
    </div>

    <!-- Phase 3: Transferring -->
    <div id="phase-transferring">
      <div>
        <div class="transfer-info">
          <span id="transfer-filename" style="font-weight: 600;">File.pdf</span>
          <span id="transfer-pct">0%</span>
        </div>
        <div style="font-size: 13px; color: var(--muted); margin-top: 4px;" id="transfer-size">0 KB</div>
      <progress id="transfer-progress" value="0" max="100" style="width: 100%; height: 16px; accent-color: var(--primary);"></progress>
      <button class="btn-cancel" onclick="cancelTransfer()">Cancel Transfer</button>
    </div>

    <!-- Phase 4: Done -->
    <div id="phase-done">
      <div class="done-icon">✓</div>
      <div>
        <p id="done-message" style="font-size: 18px; font-weight: 600; margin-bottom: 4px;">Transfer Completed!</p>
        <p id="done-subtext" style="font-size: 14px; color: var(--muted);">Saved to phone</p>
      </div>
      <button class="btn-reset" onclick="resetToPaired()">Send Another File</button>
    </div>
  </div>

  <script>
    // Change to wss://labbridge-worker.YOUR_SUBDOMAIN.workers.dev for production
    const WORKER_URL = window.LABBRIDGE_WORKER_URL || 'ws://localhost:8787';
    const HTTP_URL = WORKER_URL.replace('ws://', 'http://').replace('wss://', 'https://');

    const state = {
      sessionId: null,
      ws: null,
      cryptoKey: null,
      folderTree: [],
      currentFolderId: null,
      currentFolderPath: [],
      phase: 'waiting',
      timerInterval: null,
      expirySeconds: 120,
      connectedDevice: null,
      currentTransfer: null,
      sendQueue: [],
      receivedFiles: []
    };

    window.addEventListener('DOMContentLoaded', () => {
      createSession();
      setupDropzone();
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function flattenTreeList(tree, parentId = null) {
      let result = [];
      if (!tree || !Array.isArray(tree)) return result;
      for (const item of tree) {
        const flatItem = {
          id: item.id,
          name: item.name || 'Folder',
          parentId: item.parentId || item.parent_id || parentId,
          color: item.color || '#6C63FF'
        };
        result.push(flatItem);
        if (item.children && Array.isArray(item.children)) {
          result = result.concat(flattenTreeList(item.children, item.id));
        }
      }
      return result;
    }

    async function createSession() {
      clearInterval(state.timerInterval);
      if (state.ws) {
        const oldWs = state.ws;
        state.ws = null;
        oldWs.onclose = null;
        if (oldWs.readyState === WebSocket.OPEN && state.phase !== 'waiting') {
          try { oldWs.send(JSON.stringify({ type: 'cancelled' })); } catch (e) {}
        }
        try { oldWs.close(); } catch (e) {}
      }
      if (state.receivedFiles) {
        state.receivedFiles.forEach(f => f.blobUrl && URL.revokeObjectURL(f.blobUrl));
      }
      state.expirySeconds = 120;
      state.sendQueue = [];
      state.receivedFiles = [];
      state.currentTransfer = null;
      setPhase('waiting');
      updateTimerDisplay();

      try {
        const res = await fetch(`${HTTP_URL}/session/new`);
        const data = await res.json();
        state.sessionId = data.session_id;

        if (data.expires_at) {
          state.expirySeconds = Math.max(0, Math.floor((new Date(data.expires_at).getTime() - Date.now()) / 1000));
        } else {
          state.expirySeconds = 120;
        }
        updateTimerDisplay();

        const qrEl = document.getElementById('qrcode');
        qrEl.innerHTML = '';
        new QRCode(qrEl, {
          text: data.qr_payload,
          width: 220,
          height: 220,
          colorDark: "#0A0A0F",
          colorLight: "#E8E8F0",
          correctLevel: QRCode.CorrectLevel.M
        });

        state.timerInterval = setInterval(() => {
          state.expirySeconds--;
          updateTimerDisplay();
          if (state.expirySeconds <= 0) {
            if (state.phase !== 'waiting') {
              console.warn('Session expired. Please rescan.');
            }
            createSession();
          }
        }, 1000);

        connectWebSocket();
      } catch (err) {
        setStatus(false, 'Error creating session');
        console.error(err);
      }
    }

    function handlePeerDisconnected() {
      if (state.phase !== 'waiting') {
        setStatus(false, 'Disconnected by phone');
        document.getElementById('btn-disconnect').style.display = 'none';
        clearInterval(state.timerInterval);
        const oldWs = state.ws;
        state.ws = null;
        if (oldWs) {
          oldWs.onclose = null;
          try { oldWs.close(); } catch (e) {}
        }
        setPhase('waiting');
        createSession();
      }
    }

    function updateTimerDisplay() {
      const el = document.getElementById('timer-sec');
      if (el) el.innerText = `${state.expirySeconds}s`;
      if (state.phase !== 'waiting' && state.connectedDevice) {
        setStatus(true, `Connected: ${state.connectedDevice} (${state.expirySeconds}s left)`);
      }
    }

    function connectWebSocket() {
      if (state.ws) {
        const old = state.ws;
        old.onclose = null;
        try { old.close(); } catch (e) {}
      }
      const ws = new WebSocket(`${WORKER_URL}/session/${state.sessionId}/pc`);
      ws.binaryType = 'arraybuffer';
      state.ws = ws;

      ws.onopen = () => {
        setStatus(false, 'Waiting for phone...');
      };

      ws.onmessage = async (event) => {
        if (typeof event.data === 'string') {
          const msg = JSON.parse(event.data);
          handleTextMessage(msg);
        } else if (event.data instanceof ArrayBuffer) {
          handleIncomingBinaryChunk(event.data);
        }
      };

      ws.onclose = () => {
        handlePeerDisconnected();
      };
    }

    async function handleTextMessage(msg) {
      if (msg.type === 'waiting') {
        setStatus(false, 'Waiting for phone...');
      } else if (msg.type === 'paired') {
        state.expirySeconds = 240;
        updateTimerDisplay();
        state.connectedDevice = msg.device || 'Phone App';
        setStatus(true, `Connected: ${state.connectedDevice} (${state.expirySeconds}s left)`);
        document.getElementById('btn-disconnect').style.display = 'block';
        state.cryptoKey = await deriveAESKey(state.sessionId);
        setPhase('paired');
      } else if (msg.type === 'folders') {
        const list = msg.folders || flattenTreeList(msg.tree || []);
        state.folderTree = list;
        renderFolders();
      } else if (msg.type === 'ready') {
        if (state.currentTransfer && state.currentTransfer.direction === 'sending') {
          startSendingChunks();
        }
      } else if (msg.type === 'ack') {
        if (state.currentTransfer && state.currentTransfer.direction === 'sending') {
          handleAck(msg.chunk_index);
        }
      } else if (msg.type === 'transfer_init') {
        state.currentTransfer = {
          direction: 'receiving',
          filename: msg.filename || 'received_file',
          size: typeof msg.size === 'number' ? msg.size : 0,
          total_chunks: typeof msg.total_chunks === 'number' ? msg.total_chunks : 0,
          mime_type: msg.mime_type || 'application/octet-stream',
          receivedChunks: 0,
          chunksData: new Array(typeof msg.total_chunks === 'number' ? msg.total_chunks : 0)
        };
        setPhase('transferring');
        updateProgressDisplay(state.currentTransfer.filename, state.currentTransfer.size, 0);
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'ready' }));
        }
      } else if (msg.type === 'cancelled') {
        alert('Transfer cancelled by phone');
        setPhase('paired');
      } else if (msg.type === 'disconnected') {
        handlePeerDisconnected();
      }
    }

    function setStatus(active, text) {
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      if (active) dot.classList.add('active');
      else dot.classList.remove('active');
      txt.innerText = text;
    }

    function setPhase(phase) {
      state.phase = phase;
      document.getElementById('phase-waiting').style.display = (phase === 'waiting') ? 'flex' : 'none';
      document.getElementById('phase-paired').style.display = (phase === 'paired') ? 'flex' : 'none';
      document.getElementById('phase-transferring').style.display = (phase === 'transferring') ? 'flex' : 'none';
      document.getElementById('phase-done').style.display = (phase === 'done') ? 'flex' : 'none';
      if (phase === 'paired') {
        renderFolders();
        renderReceivedFiles();
      }
    }

    function disconnectSession() {
      if (state.ws) {
        const oldWs = state.ws;
        state.ws = null;
        oldWs.onclose = null;
        try { oldWs.send(JSON.stringify({ type: 'disconnected' })); } catch (e) {}
        try { oldWs.close(); } catch (e) {}
      }
      clearInterval(state.timerInterval);
      setPhase('waiting');
      document.getElementById('btn-disconnect').style.display = 'none';
      createSession();
    }

    // Folder Navigation & Rendering
    function navigateRoot() {
      state.currentFolderId = null;
      state.currentFolderPath = [];
      renderFolders();
    }

    function navigateIntoFolder(id, name) {
      state.currentFolderId = id;
      state.currentFolderPath.push({ id, name });
      renderFolders();
    }

    function renderFolders() {
      // Render breadcrumbs safely using DOM manipulation
      const bcEl = document.getElementById('breadcrumb');
      if (!bcEl) return;
      bcEl.innerHTML = '';
      
      const rootSpan = document.createElement('span');
      rootSpan.className = 'breadcrumb-item';
      rootSpan.textContent = 'Root';
      rootSpan.addEventListener('click', () => navigateRoot());
      bcEl.appendChild(rootSpan);

      for (let i = 0; i < state.currentFolderPath.length; i++) {
        const item = state.currentFolderPath[i];
        const sepSpan = document.createElement('span');
        sepSpan.className = 'breadcrumb-sep';
        sepSpan.textContent = ' > ';
        bcEl.appendChild(sepSpan);

        const itemSpan = document.createElement('span');
        itemSpan.className = 'breadcrumb-item';
        itemSpan.textContent = item.name;
        itemSpan.addEventListener('click', () => navigateUpTo(i));
        bcEl.appendChild(itemSpan);
      }

      // Find children of currentFolderId (checking both camelCase and snake_case parentId)
      const children = (state.folderTree || []).filter(f => {
        const pid = f.parentId !== undefined ? f.parentId : f.parent_id;
        return pid === state.currentFolderId || (state.currentFolderId === null && !pid);
      });
      const gridEl = document.getElementById('folder-grid');
      if (!gridEl) return;

      if (children.length === 0) {
        gridEl.innerHTML = `<p style="color: var(--muted); font-size: 13px; align-self: center;">No subfolders inside this directory</p>`;
        return;
      }

      gridEl.innerHTML = '';
      children.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'folder-btn';
        btn.textContent = `📁 ${f.name || 'Folder'}`;
        btn.addEventListener('click', () => navigateIntoFolder(f.id, f.name || 'Folder'));
        gridEl.appendChild(btn);
      });
    }

    function navigateUpTo(index) {
      if (index < 0) {
        navigateRoot();
        return;
      }
      state.currentFolderPath = state.currentFolderPath.slice(0, index + 1);
      state.currentFolderId = state.currentFolderPath[state.currentFolderPath.length - 1].id;
      renderFolders();
    }

    // HKDF / AES-GCM Key Derivation & Encryption
    async function deriveAESKey(sessionId) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey(
        'raw', enc.encode(sessionId), { name: 'HKDF' }, false, ['deriveKey']
      );
      return await crypto.subtle.deriveKey(
        {
          name: 'HKDF',
          hash: 'SHA-256',
          salt: enc.encode('labbridge-v2'),
          info: enc.encode('file-transfer')
        },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptChunk(plaintextBuffer, key, chunkIndex) {
      const iv = new Uint8Array(12);
      crypto.getRandomValues(iv);
      const view = new DataView(iv.buffer);
      view.setUint32(8, chunkIndex, false);

      const ciphertext = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        plaintextBuffer
      );

      const combined = new Uint8Array(12 + ciphertext.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(ciphertext), 12);
      return combined.buffer;
    }

    async function decryptChunk(combinedBuffer, key, chunkIndex) {
      const combined = new Uint8Array(combinedBuffer);
      const iv = combined.slice(0, 12);
      
      const view = new DataView(iv.buffer, iv.byteOffset, iv.byteLength);
      const extractedIndex = view.getUint32(8, false);
      if (extractedIndex !== chunkIndex) {
        throw new Error(`Chunk index mismatch: expected ${chunkIndex}, got ${extractedIndex}`);
      }
      
      const ciphertext = combined.slice(12);

      return await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        ciphertext
      );
    }

    // File Drop & Sending
    function setupDropzone() {
      const dz = document.getElementById('dropzone');
      const fileInput = document.getElementById('file-input');

      dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
      dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          queueFiles(Array.from(e.dataTransfer.files));
        }
      });

      fileInput.addEventListener('change', (e) => {
        if (fileInput.files && fileInput.files.length > 0) {
          queueFiles(Array.from(fileInput.files));
          fileInput.value = '';
        }
      });
    }

    function queueFiles(files) {
      if (state.phase !== 'paired' && state.phase !== 'transferring') return;
      const validFiles = files.filter(f => {
        if (f.size > 500 * 1024 * 1024) {
          console.warn(`File ${f.name} is too large. Maximum size is 500MB.`);
          alert(`File ${f.name} is too large. Maximum size is 500MB.`);
          return false;
        }
        return true;
      });
      if (validFiles.length === 0) return;
      
      state.sendQueue.push(...validFiles);
      if (state.phase === 'paired' && !state.currentTransfer) {
        processNextInQueue();
      } else {
        updateQueueDisplay();
      }
    }

    function updateQueueDisplay() {
      const qs = document.getElementById('queue-status');
      if (qs && state.sendQueue.length > 0) {
        qs.innerText = `${state.sendQueue.length} more file(s) waiting in queue...`;
      } else if (qs) {
        qs.innerText = 'Will be saved directly to the selected folder above';
      }
    }

    function processNextInQueue() {
      if (state.sendQueue.length === 0) {
        setPhase('paired');
        updateQueueDisplay();
        return;
      }
      setPhase('paired');
      const file = state.sendQueue.shift();
      updateQueueDisplay();
      initiateSendFile(file);
    }

    function initiateSendFile(file) {
      if (state.phase !== 'paired' && state.phase !== 'transferring') return;
      const totalChunks = Math.max(1, Math.ceil(file.size / (512 * 1024)));
      
      state.currentTransfer = {
        direction: 'sending',
        file: file,
        filename: file.name,
        size: file.size,
        total_chunks: totalChunks,
        sentChunks: 0,
        pendingAck: null
      };

      setPhase('transferring');
      updateProgressDisplay(file.name, file.size, 0);

      state.ws.send(JSON.stringify({
        type: 'transfer_init',
        filename: file.name,
        size: file.size,
        total_chunks: totalChunks,
        folder_id: state.currentFolderId,
        mime_type: file.type || 'application/octet-stream'
      }));
    }

    async function startSendingChunks() {
      if (!state.currentTransfer || state.currentTransfer.direction !== 'sending') return;
      sendNextChunk(0);
    }

    async function sendNextChunk(chunkIndex) {
      const transfer = state.currentTransfer;
      if (!transfer || chunkIndex >= transfer.total_chunks) {
        state.currentTransfer = null;
        if (state.sendQueue.length > 0) {
          processNextInQueue();
        } else {
          setPhase('paired');
          updateQueueDisplay();
          setStatus(true, `Connected: ${state.connectedDevice} (Last sent: ${transfer ? transfer.filename : 'file'})`);
        }
        return;
      }

      const offset = chunkIndex * 512 * 1024;
      const slice = transfer.file.slice(offset, offset + 512 * 1024);
      const arrayBuffer = await slice.arrayBuffer();

      const encrypted = await encryptChunk(arrayBuffer, state.cryptoKey, chunkIndex);
      transfer.pendingAck = chunkIndex;
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(encrypted);
      }
    }

    function handleAck(chunkIndex) {
      const transfer = state.currentTransfer;
      if (!transfer || transfer.direction !== 'sending') return;
      
      state.expirySeconds = 240;
      updateTimerDisplay();

      transfer.sentChunks++;
      const pct = Math.round((transfer.sentChunks / transfer.total_chunks) * 100);
      updateProgressDisplay(transfer.filename, transfer.size, pct);

      sendNextChunk(chunkIndex + 1);
    }

    // Receiving Binary Chunks (Phone to PC)
    async function handleIncomingBinaryChunk(buffer) {
      const transfer = state.currentTransfer;
      if (!transfer || transfer.direction !== 'receiving') return;

      state.expirySeconds = 240;
      updateTimerDisplay();

      const chunkIndex = transfer.receivedChunks;
      try {
        const decrypted = await decryptChunk(buffer, state.cryptoKey, chunkIndex);
        // Wrap decrypted chunk in a Blob immediately so browser can page/spill off heap
        transfer.chunksData[chunkIndex] = new Blob([decrypted]);
        transfer.receivedChunks++;

        const pct = Math.round((transfer.receivedChunks / transfer.total_chunks) * 100);
        updateProgressDisplay(transfer.filename, transfer.size, pct);

        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'ack', chunk_index: chunkIndex }));
        }

        if (transfer.receivedChunks >= transfer.total_chunks) {
          const finalBlob = new Blob(transfer.chunksData, { type: transfer.mime_type });
          // Release references to intermediate chunks immediately to free memory
          transfer.chunksData = null;
          const blobUrl = URL.createObjectURL(finalBlob);
          state.receivedFiles = state.receivedFiles || [];
          state.receivedFiles.push({
            filename: transfer.filename,
            size: transfer.size,
            blobUrl: blobUrl
          });
          renderReceivedFiles();

          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = transfer.filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

          state.currentTransfer = null;
          if (state.sendQueue.length > 0) {
            processNextInQueue();
          } else {
            setPhase('paired');
            updateQueueDisplay();
            setStatus(true, `Connected: ${state.connectedDevice} (Received: ${transfer.filename})`);
          }
        }
      } catch (err) {
        console.error('Failed to decrypt incoming chunk:', err);
      }
    }

    function renderReceivedFiles() {
      const section = document.getElementById('received-files-section');
      const list = document.getElementById('received-files-list');
      if (!section || !list) return;
      if (!state.receivedFiles || state.receivedFiles.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      list.innerHTML = '';
      state.receivedFiles.forEach(f => {
        const item = document.createElement('div');
        item.className = 'received-item';
        item.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px;';

        const info = document.createElement('div');
        info.style.cssText = 'overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 65%;';
        const strong = document.createElement('strong');
        strong.style.cssText = 'font-size: 14px; color: var(--text);';
        strong.textContent = f.filename;
        const br = document.createElement('br');
        const span = document.createElement('span');
        span.style.cssText = 'font-size: 12px; color: var(--muted);';
        span.textContent = `${(f.size / (1024 * 1024)).toFixed(2)} MB`;
        info.appendChild(strong);
        info.appendChild(br);
        info.appendChild(span);

        const a = document.createElement('a');
        a.href = f.blobUrl;
        a.download = f.filename;
        a.style.cssText = 'background: var(--primary); color: white; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; white-space: nowrap;';
        a.textContent = '📥 Download';

        item.appendChild(info);
        item.appendChild(a);
        list.appendChild(item);
      });
    }

    function cancelTransfer() {
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify({ type: 'cancelled' }));
      }
      resetToPaired();
    }

    function resetToPaired() {
      state.currentTransfer = null;
      if (state.sendQueue.length > 0) {
        processNextInQueue();
      } else {
        setPhase('paired');
        updateQueueDisplay();
      }
    }

    function updateProgressDisplay(filename, size, pct) {
      document.getElementById('transfer-filename').innerText = filename;
      document.getElementById('transfer-size').innerText = formatSize(size);
      document.getElementById('transfer-pct').innerText = `${pct}%`;
      const prog = document.getElementById('transfer-progress');
      if (prog) prog.value = pct;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }
  </script>
</body>
</html>
